<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Account</title>

    <link rel="stylesheet" href="{{url_for('static', filename='/css/account.css')}}" />
</head>
<body>
    {% extends "base.html" %}
    {% block content %}

    <h1 class="title"> My Account </h1>
    <div class="underline"></div>
    <div class="dashboard">
        <div class="sideNav">
            <div class="myAccount">
                <h3> My Account</h3>
                <a href="account"> User Details </a>
                <a href="wip"> Purchases </a>
                <a href="wip"> Loyalty Points </a>
            </div>
            {% if currentUserDetails[5] == True %}
            <div class="myProducts">
                <h3> My Products</h3>
                <a href="account_myProfile"> My Profile </a>
                <a href="account_addProducts"> Add Products </a>
                <a href="account_editProducts"> Edit Products</a>
            </div>
            {% endif %}

            <br>
            <a href="/logout"> Logout </a>
            <br>

            <div class="settings">
                <a href="wip"> Settings </a>
            </div>
        </div>

        <form method="POST" class="sideContainer">
            <h2> Account Details </h2>
                    <h3> Name </h3>
                    <input id="name" name="name" placeholder="{{currentUserDetails[1]}}">

                    <h3> Email </h3>
                    <input id="email" name="email" placeholder="{{currentUserDetails[2]}}">

                    <h3> Phone Number </h3>
                    <input id="phoneNumber" name="phoneNumber" placeholder="{{currentUserDetails[4]}}">
            <button class="button" type="submit"> Save Changes </button>
        </form>

    </div>

    {% endblock %}

</body>
</html>
